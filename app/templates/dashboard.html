<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Premium</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">Chat Premium</div>

        <div class="search-box">
            <input id="friendSearch" placeholder="Buscar @username para adicionar">
            <button id="sendRequestBtn" type="button">Adicionar</button>
        </div>

        <div class="section-title">Solicitações pendentes</div>
        <div id="pendingList" class="pending-list"></div>

        <div class="section-title">Meus amigos</div>
        <div id="friendsList" class="friends-list"></div>
    </aside>

    <main class="chat">
        <header class="topbar">
            <div class="me">
                <img class="avatar" src="{{ url_for('static', filename=session.get('profile_image', 'uploads/default-avatar.svg')) }}" alt="avatar">
                <div>
                    <strong>@{{ session.username }}</strong>
                    <small id="chatWith">Selecione um amigo para conversar</small>
                </div>
            </div>
            <div class="actions">
                <a class="btn" href="{{ url_for('profile.profile_page') }}">Perfil</a>
                {% if session.get('role') == 'admin' %}
                <a class="btn" href="{{ url_for('admin.panel') }}">Admin</a>
                {% endif %}
                <a class="btn danger" href="{{ url_for('auth.logout') }}">Sair</a>
            </div>
        </header>

        <section class="messages" id="messages"></section>

        <footer class="composer">
            <div class="media-actions">
                <button class="icon-btn" id="imageBtn" type="button">🖼️</button>
                <button class="icon-btn" id="audioBtn" type="button">🎙️</button>
                <button class="icon-btn" id="videoBtn" type="button">🎥</button>
            </div>
            <input type="file" id="imageInput" accept="image/*" hidden>
            <input type="file" id="audioInput" accept="audio/*" hidden>
            <input type="file" id="videoInput" accept="video/*" hidden>

            <input id="messageInput" placeholder="Digite uma mensagem">
            <button id="sendBtn" type="button">Enviar</button>
        </footer>
    </main>
</div>

<script>
    window.currentUser = {{ session.username|tojson }};
</script>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
